name: CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled

jobs:
  label-pr:
    name: Ensure Version Label
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Apply default patch label if no version label present
        uses: actions/github-script@v7
        with:
          script: |
            const versionLabels = ['patch', 'minor', 'major'];
            const labels = context.payload.pull_request.labels.map(l => l.name);
            const hasVersionLabel = labels.some(l => versionLabels.includes(l));
            if (!hasVersionLabel) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['patch'],
              });
              core.info('No version label found — applied default "patch" label.');
            } else {
              core.info(`Version label already present: ${labels.filter(l => versionLabels.includes(l)).join(', ')}`);
            }


  static-validation:
    name: Static Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"

      - name: Install tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: Install terraform-docs
        run: |
          TERRAFORM_DOCS_VERSION=v0.18.0
          curl -sSLo /tmp/terraform-docs.tar.gz \
            "https://github.com/terraform-docs/terraform-docs/releases/download/${TERRAFORM_DOCS_VERSION}/terraform-docs-${TERRAFORM_DOCS_VERSION}-linux-amd64.tar.gz"
          tar -xzf /tmp/terraform-docs.tar.gz -C /tmp
          chmod +x /tmp/terraform-docs
          sudo mv /tmp/terraform-docs /usr/local/bin/

      - name: Run static checks
        run: make static-check

  terratest:
    name: Terratest
    runs-on: ubuntu-latest
    env:
      LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.5"
          terraform_wrapper: false

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: test/go.mod

      - name: Start LocalStack
        uses: LocalStack/setup-localstack@v0.2.3
        with:
          image-tag: "latest"
          use-pro: "false"
          install-awslocal: "true"
          configuration: SERVICES=ec2
        env:
          LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

      - name: Run Terratest
        run: make terratest

      - name: Dump LocalStack logs
        if: failure()
        run: localstack logs
